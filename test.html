<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test</title>
<style>body{background:#0b0b14;color:#fff;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:10px}
button{padding:15px 30px;font-size:18px;border:none;border-radius:10px;background:#f0c040;color:#000;font-weight:bold;cursor:pointer}
#out{color:#2eb870;font-size:14px}</style>
</head><body>
<h1 style="color:#f0c040">Hanabi Test</h1>
<p>Se vedi questo, il sito funziona!</p>
<button type="button" onclick="document.getElementById('out').textContent='Bottone OK! '+new Date().toLocaleTimeString()">TOCCA QUI</button>
<div id="out"></div>
<p style="font-size:12px;color:#666">Test PeerJS...</p>
<div id="peer" style="font-size:12px"></div>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
var pe=document.getElementById('peer');
if(typeof Peer==='undefined'){pe.textContent='PeerJS NON caricato';pe.style.color='#e83650'}
else{pe.textContent='PeerJS caricato, connessione...';pe.style.color='#f0c040';
try{var p=new Peer();p.on('open',function(id){pe.textContent='CONNESSO! ID: '+id.substr(0,12);pe.style.color='#2eb870'});
p.on('error',function(e){pe.textContent='Errore: '+e.type;pe.style.color='#e83650'})}
catch(e){pe.textContent='Crash: '+e.message;pe.style.color='#e83650'}}
</script>
</body></html>
